host:
  name: vps
  os_family: linux
  shell: /bin/bash
  package_manager: apt
  user: root
  timezone: UTC

repo:
  source: github
  trusted_org: swiftbox-scripts
  branch: main
  verify_checksums: true

execution:
  mode: awareness          # dry-run | awareness | auto
  safety_level: high       # low | medium | high
  max_retries: 2
  timeout_seconds: 60
  dry_run: true            # override to false explicitly to act

allowed_actions:
  - disk.check_usage
  - disk.clean_tmp
  - network.check_connectivity
  - network.restart_interface
  - process.list
  - process.kill_zombie
  - services.check_status
  - services.restart

blocked_actions:
  - disk.format
  - disk.wipe
  - system.reboot
  - system.shutdown

verification:
  enabled: true
  checks:
    - services.check_status
    - disk.check_usage
    - network.check_connectivity

notifications:
  targets:
    - stdout
    - filelog
  log_path: logs/vps.log